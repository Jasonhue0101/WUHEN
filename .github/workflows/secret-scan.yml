name: "🔒 敏感信息扫描"

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  gitleaks-scan:
    name: 扫描敏感信息
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须获取完整历史以检查所有 commit

      - name: 运行 Gitleaks 扫描
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 如果发现敏感信息，Action 将运行失败并阻止 PR 合并
          fail-on-leak: true 

      - name: 扫描结果通知
        if: failure()
        run: |
          echo "❌ 检测到潜在的敏感信息泄露（API Key、Token 或 密码）！"
          echo "请检查下方的扫描日志，并在合并前清理 Git 历史记录。"
